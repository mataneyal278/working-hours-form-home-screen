<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>חישוב חשמל לדיירים</title>
    <meta name="description" content="צילום מונים, חישוב חשמל והכנת חשבונות לדיירים">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="חישוב חשמל">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="חישוב חשמל">
    <meta name="theme-color" content="#18324a">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=2">
    <link rel="icon" type="image/png" sizes="192x192" href="./favicon-192.png?v=2">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png?v=2">
    <link rel="shortcut icon" type="image/png" href="./favicon-32.png?v=2">
    <link rel="manifest" href="./manifest.webmanifest?v=2">
    <meta property="og:title" content="חישוב חשמל לדיירים">
    <meta property="og:image" content="./apple-touch-icon.png?v=2">
    <script>
      const APP_URL = 'https://script.google.com/macros/s/AKfycbzMxvDb0dUq915mtkGmS86qrpvj9sMlx1oZbSLpwIp4khS3okg_TujSsyqjfADK7SSN/exec';
      const installMode = new URLSearchParams(window.location.search).get('install') === '1';
      const standaloneMode =
        window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true;

      if (standaloneMode || !installMode) {
        window.location.replace(APP_URL);
      }
    </script>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, "Noto Sans Hebrew", sans-serif;
        background: #f7f7f4;
        color: #1f2933;
      }

      * { box-sizing: border-box; }

      html,
      body {
        height: 100%;
        margin: 0;
        width: 100%;
      }

      body {
        align-items: center;
        background:
          linear-gradient(rgba(14, 30, 45, 0.3), rgba(14, 30, 45, 0.58)),
          url("./apple-touch-icon.png?v=2") center / cover no-repeat;
        display: flex;
        justify-content: center;
        min-height: 100%;
        padding:
          max(24px, env(safe-area-inset-top))
          max(20px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom))
          max(20px, env(safe-area-inset-left));
      }

      .launcher {
        align-items: center;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.75);
        border-radius: 24px;
        box-shadow: 0 20px 54px rgba(8, 22, 34, 0.32);
        display: flex;
        flex-direction: column;
        gap: 16px;
        max-width: 390px;
        padding: 30px 24px 26px;
        text-align: center;
        width: 100%;
      }

      .launcher img {
        border-radius: 24%;
        box-shadow: 0 14px 34px rgba(24, 50, 74, 0.22);
        height: 144px;
        object-fit: cover;
        width: 144px;
      }

      h1 {
        font-size: 25px;
        line-height: 1.25;
        margin: 4px 0 0;
      }

      p {
        color: #66727d;
        font-size: 15px;
        line-height: 1.55;
        margin: 0;
      }

      .open-app {
        align-items: center;
        background: #1f6f5b;
        border-radius: 12px;
        color: #fff;
        display: inline-flex;
        font-size: 17px;
        font-weight: 700;
        justify-content: center;
        min-height: 52px;
        padding: 0 22px;
        text-decoration: none;
        width: 100%;
      }

      .install-note {
        border-top: 1px solid #e0e5e1;
        padding-top: 16px;
      }
    </style>
  </head>
  <body>
    <main class="launcher">
      <img src="./apple-touch-icon.png?v=2" alt="הבית בשקיעה">
      <h1>חישוב חשמל לדיירים</h1>
      <p>האפליקציה נפתחת בחשבון Google המורשה שלך.</p>
      <a
        id="openApp"
        class="open-app"
        href="https://script.google.com/macros/s/AKfycbzMxvDb0dUq915mtkGmS86qrpvj9sMlx1oZbSLpwIp4khS3okg_TujSsyqjfADK7SSN/exec"
      >פתח את האפליקציה</a>
      <p class="install-note">להתקנה באייפון: שיתוף → הוספה למסך הבית. לאחר ההתקנה, האייקון יפתח את האפליקציה ישירות.</p>
    </main>
  </body>
</html>
